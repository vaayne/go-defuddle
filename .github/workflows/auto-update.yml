name: Auto Update Defuddle

on:
  schedule:
    - cron: "0 0 * * *" # Daily at 00:00 UTC
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: auto-update-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Get current submodule commit
        id: current
        run: |
          set -euo pipefail
          CURRENT=$(git submodule status defuddle | awk '{print $1}' | tr -d '+')
          echo "commit=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current submodule: $CURRENT"

      - name: Resolve latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Get latest release tag
          tag=$(gh api repos/kepano/defuddle/releases/latest --jq .tag_name)
          test -n "$tag" && test "$tag" != "null"
          echo "Latest upstream tag: $tag"

          # Fetch tags in submodule and resolve to commit
          git -C defuddle fetch --force --tags origin
          commit=$(git -C defuddle rev-list -n1 "refs/tags/$tag")
          test -n "$commit"
          echo "Resolved to commit: $commit"

          {
            echo "tag=$tag"
            echo "commit=$commit"
          } >> "$GITHUB_OUTPUT"

      - name: Compare and determine update
        id: update
        env:
          CURRENT: ${{ steps.current.outputs.commit }}
          UPSTREAM: ${{ steps.upstream.outputs.commit }}
        run: |
          set -euo pipefail

          if [ "$CURRENT" = "$UPSTREAM" ]; then
            echo "Submodule is already up to date ($CURRENT)"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Update needed: $CURRENT -> $UPSTREAM"
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.update.outputs.updated == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Go
        if: steps.update.outputs.updated == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Update submodule to exact release
        if: steps.update.outputs.updated == 'true'
        env:
          UPSTREAM_COMMIT: ${{ steps.upstream.outputs.commit }}
        run: |
          set -euo pipefail
          git -C defuddle checkout --detach "$UPSTREAM_COMMIT"

      - name: Install dependencies and rebuild
        if: steps.update.outputs.updated == 'true'
        run: |
          set -euo pipefail
          npm ci
          npx webpack

      - name: Run tests
        if: steps.update.outputs.updated == 'true'
        run: |
          set -euo pipefail
          go vet ./...
          go test -v ./...

      - name: Commit and push changes
        if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail

          # Stage changes
          git add defuddle internal/js/defuddle-bundle.js

          # Commit with upstream tag info
          git commit -m "⬆️ chore: update defuddle submodule to ${UPSTREAM_TAG}"

          # Push to main
          git remote add push-origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push push-origin HEAD:main

          echo "Updated defuddle submodule to ${UPSTREAM_TAG}"
