name: Auto Update Defuddle

on:
  schedule:
    - cron: "0 0 * * *" # Daily at 00:00 UTC
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: auto-update-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.update.outputs.updated }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Get current submodule commit
        id: current
        run: |
          set -euo pipefail
          CURRENT=$(git submodule status defuddle | awk '{print $1}' | tr -d '+')
          echo "commit=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current submodule: $CURRENT"

      - name: Resolve latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Get latest release tag
          tag=$(gh api repos/kepano/defuddle/releases/latest --jq .tag_name)
          test -n "$tag" && test "$tag" != "null"
          echo "Latest upstream tag: $tag"

          # Fetch tags in submodule and resolve to commit
          git -C defuddle fetch --force --tags origin
          commit=$(git -C defuddle rev-list -n1 "refs/tags/$tag")
          test -n "$commit"
          echo "Resolved to commit: $commit"

          {
            echo "tag=$tag"
            echo "commit=$commit"
          } >> "$GITHUB_OUTPUT"

      - name: Compare and determine update
        id: update
        env:
          CURRENT: ${{ steps.current.outputs.commit }}
          UPSTREAM: ${{ steps.upstream.outputs.commit }}
        run: |
          set -euo pipefail

          if [ "$CURRENT" = "$UPSTREAM" ]; then
            echo "Submodule is already up to date ($CURRENT)"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Update needed: $CURRENT -> $UPSTREAM"
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.update.outputs.updated == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Go
        if: steps.update.outputs.updated == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Update submodule to exact release
        if: steps.update.outputs.updated == 'true'
        env:
          UPSTREAM_COMMIT: ${{ steps.upstream.outputs.commit }}
        run: |
          set -euo pipefail
          git -C defuddle checkout --detach "$UPSTREAM_COMMIT"

      - name: Install dependencies and rebuild
        if: steps.update.outputs.updated == 'true'
        run: |
          set -euo pipefail
          npm ci
          npx webpack

      - name: Run tests
        if: steps.update.outputs.updated == 'true'
        run: |
          set -euo pipefail
          go vet ./...
          go test -v ./...

      - name: Stage changes
        if: steps.update.outputs.updated == 'true'
        run: |
          set -euo pipefail
          git add defuddle internal/js/defuddle-bundle.js

      - name: Get and bump version
        if: steps.update.outputs.updated == 'true'
        id: bump_version
        run: |
          set -euo pipefail

          # Fetch all tags
          git fetch --force --tags origin

          # Get latest version tag (sorted by semver)
          latest_tag=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          latest_tag="${latest_tag:-v0.0.0}"
          echo "Latest tag: $latest_tag"

          # Parse and bump patch version
          version=${latest_tag#v}
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          patch=$(echo "$version" | cut -d. -f3)
          new_patch=$((patch + 1))
          new_version="v$major.$minor.$new_patch"

          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "display_version=$major.$minor.$new_patch" >> "$GITHUB_OUTPUT"
          echo "Bumping: $latest_tag -> $new_version"

      - name: Validate upstream tag
        if: steps.update.outputs.updated == 'true'
        env:
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          set -euo pipefail
          git check-ref-format --allow-onelevel "refs/tags/$UPSTREAM_TAG"

      - name: Update CHANGELOG
        if: steps.update.outputs.updated == 'true'
        env:
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
          DISPLAY_VERSION: ${{ steps.bump_version.outputs.display_version }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
          UPSTREAM_COMMIT: ${{ steps.upstream.outputs.commit }}
        run: |
          set -euo pipefail

          TODAY=$(date +%Y-%m-%d)
          SHORT_COMMIT="${UPSTREAM_COMMIT:0:7}"

          # Create changelog entry
          entry=$(cat <<EOF
## [${DISPLAY_VERSION}] - ${TODAY}

### Changed

- Updated Defuddle submodule to [\`${SHORT_COMMIT}\`](https://github.com/kepano/defuddle/commit/${UPSTREAM_COMMIT}) (${UPSTREAM_TAG}).
- Rebuilt JS bundle with latest upstream changes.

EOF
          )

          # Insert before first version heading
          awk -v entry="$entry" '
            !done && /^## \[/ { print entry; done=1 }
            { print }
          ' CHANGELOG.md > CHANGELOG.md.new && mv CHANGELOG.md.new CHANGELOG.md

          # Add link reference
          printf '[%s]: https://github.com/%s/releases/tag/%s\n' \
            "$DISPLAY_VERSION" "$GITHUB_REPOSITORY" "$NEW_VERSION" >> CHANGELOG.md

          git add CHANGELOG.md

      - name: Commit and push with atomic tag
        if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail

          # Configure remote with token
          git remote add push-origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Commit
          git commit -m "⬆️ chore: update defuddle submodule to ${UPSTREAM_TAG}

- Update submodule to latest upstream release
- Rebuild JS bundle
- Bump version to ${NEW_VERSION}"

          # Create annotated tag
          git tag -a "$NEW_VERSION" -m "Release ${NEW_VERSION}"

          # Atomic push of both branch and tag
          git push --atomic push-origin HEAD:main "$NEW_VERSION"

          echo "Released ${NEW_VERSION}"
